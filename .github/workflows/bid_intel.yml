name: Bid Intelligence Daily Brief

on:
  schedule:
    # Run at 6 AM Central (11:00 UTC during CST, 12:00 UTC during CDT)
    - cron: '0 12 * * *'
    # Run at 6 PM Central (23:00 UTC during CST, 00:00 UTC during CDT)
    - cron: '0 0 * * *'
  workflow_dispatch:  # Allow manual triggering

jobs:
  run-bid-intel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r bid_intel/requirements.txt

      - name: Run bid intelligence scraping and matching
        run: |
          python bid_intel/run_daily.py

      - name: Commit and push briefs
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add bid_intel/briefs/
          git diff --staged --quiet || git commit -m "Auto-update: Bid intelligence brief $(date +'%Y-%m-%d %H:%M')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload brief as artifact
        uses: actions/upload-artifact@v4
        with:
          name: bid-brief-${{ github.run_id }}
          path: bid_intel/briefs/*.pdf
          retention-days: 90

      - name: Summary
        run: |
          echo "### Bid Intelligence Run Complete 🎯" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Latest brief available at: https://williambevans.github.io/BCMCE/bid_intel/briefs/latest.html" >> $GITHUB_STEP_SUMMARY
